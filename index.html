<!doctype html>
<html lang="en" data-palette="hextech" data-density="compact" data-accent="ambre">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Learning Leagues — Learn League of Legends</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">

<link rel="stylesheet" href="styles.css" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="landing.jsx"></script>
<script type="text/babel">

function LandingApp() {
  return (
    <>
      <LandingNav />
      <LandingHero />

      <Showcase
        id="s-fundamentals"
        eyebrow="THE BASE LAYER"
        title={<>League of Legends <em>fundamentals.</em></>}
        lede="Map, items, runes, vision, wave management, neutral objectives. Everything you should have been taught before your first game."
        ctaLabel="Explore the fundamentals"
        ctaHref="/fundamentals"
        variant="default"
      >
        <FundamentalsVisual />
      </Showcase>

      <RolesSection />

      <Showcase
        id="s-training"
        eyebrow="REPS, NOT THEORY"
        title={<>Train your <em>skills.</em></>}
        lede="Last hits, vision, mechanics. Short drills to turn theory into reflexes — measurable progress, no grinding meta builds."
        ctaLabel="Let's go"
        ctaHref="/training"
        variant="reverse"
      >
        <TrainingVisual />
      </Showcase>

      <Showcase
        id="s-resources"
        eyebrow="GOING FURTHER"
        title={<>Tools we <em>step aside</em> for.</>}
        lede="Lolalytics, U.GG, OP.GG, DPM.LOL — for live builds and patch-by-patch stats, we step aside for the tools that already do it best."
        ctaLabel="See our recommendations"
        ctaHref="/resources"
        variant="default"
      >
        <ResourcesVisual />
      </Showcase>

      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LandingApp />);
</script>
</body>
</html>
